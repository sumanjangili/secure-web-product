name: Update VERIFY_CHECKLIST

on:
  push:
    branches: [ "main", "develop", "**" ]

jobs:
  update-checklist:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend # Ensure we run in the frontend folder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git history if needed later

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint & Tests
        id: lint_test
        run: |
          npm run lint && npm run test
          echo "status=success" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run Security Audit
        id: audit
        run: |
          npm audit --production --audit-level=high || echo "status=fail" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Prepare Checklist File
        id: prep
        run: |
          CHECKLIST_FILE="VERIFY_CHECKLIST.md"
          
          # Create file if it doesn't exist
          if [ ! -f "$CHECKLIST_FILE" ]; then
            echo "Creating $CHECKLIST_FILE..."
            cat > "$CHECKLIST_FILE" << 'EOF'
# Verification & Smoke-Test Checklist
> **Auto-updated by CI**

- [ ] <!-- Lint & tests passed -->
- [ ] <!-- npm audit clean -->
- [ ] <!-- MFA flow verified -->
- [ ] <!-- Account erasure verified -->
EOF
          fi
          
          # Read current content to preserve other lines
          echo "file_content<<EOF" >> $GITHUB_OUTPUT
          cat "$CHECKLIST_FILE"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Checklist Content
        id: update
        run: |
          CHECKLIST_FILE="VERIFY_CHECKLIST.md"
          CONTENT="${{ steps.prep.outputs.file_content }}"
          
          # Update Lint/Test status
          if [[ "${{ steps.lint_test.status }}" == "success" ]]; then
            CONTENT=$(echo "$CONTENT" | sed 's/- \[ \] <!-- Lint & tests passed -->/- [x] <!-- Lint & tests passed -->/')
          else
            CONTENT=$(echo "$CONTENT" | sed 's/- \[x\] <!-- Lint & tests passed -->/- [ ] <!-- Lint & tests passed -->/')
          fi

          # Update Audit status
          if [[ "${{ steps.audit.status }}" == "success" ]]; then
            CONTENT=$(echo "$CONTENT" | sed 's/- \[ \] <!-- npm audit clean -->/- [x] <!-- npm audit clean -->/')
          else
            CONTENT=$(echo "$CONTENT" | sed 's/- \[x\] <!-- npm audit clean -->/- [ ] <!-- npm audit clean -->/')
          fi

          # Write back to file
          echo "$CONTENT" > "$CHECKLIST_FILE"

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update VERIFY_CHECKLIST: Lint=${{ steps.lint_test.status }}, Audit=${{ steps.audit.status }}"
          file_pattern: VERIFY_CHECKLIST.md
          # Optional: If you need to push to a specific branch or use a token
          # commit_user_name: github-actions[bot]
          # commit_user_email: github-actions[bot]@users.noreply.github.com
