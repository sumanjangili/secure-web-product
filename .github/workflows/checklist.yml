name: Update VERIFY_CHECKLIST

on:
  push:
    branches: [ "**" ]

jobs:
  update-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install deps
        run: npm ci

      - name: Run lint & tests
        id: lint_test
        run: |
          npm run lint && npm run test
        continue-on-error: true

      - name: Run npm audit
        id: audit
        run: npm audit --production || echo "vulns_found=true" >> $GITHUB_ENV
        continue-on-error: true

      - name: Update checklist file
        run: |
          # Ensure the file exists, otherwise create a basic one
          if [ ! -f VERIFY_CHECKLIST.md ]; then
            echo "VERIFY_CHECKLIST.md not found. Creating a basic template."
            cat > VERIFY_CHECKLIST.md << 'EOF'
# Verification & Smoke‑Test Checklist
... (rest of your template content) ...
EOF
          fi

          # Replace unchecked boxes with checked ones if steps succeeded
          # Note: We use a simple string replacement for the markdown checkbox
          
          if [[ "${{ steps.lint_test.outcome }}" == "success" ]]; then
            sed -i 's/- \[ \] <!-- Lint & tests passed -->/- [x] <!-- Lint & tests passed -->/' VERIFY_CHECKLIST.md
          fi

          if [[ -z "$vulns_found" ]]; then
            sed -i 's/- \[ \] <!-- npm audit clean -->/- [x] <!-- npm audit clean -->/' VERIFY_CHECKLIST.md
          fi

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto‑update VERIFY_CHECKLIST (CI results)"
          branch: ${{ github.ref }}
          file_pattern: VERIFY_CHECKLIST.md
