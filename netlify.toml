# netlify.toml
[build]
  # REMOVE THIS LINE: base = "frontend" 
  # We will handle the frontend build via the command below
  
  # Run build from root, targeting the frontend folder
  command = "cd frontend && npm run build"
  publish = "frontend/dist" # Adjust this path to match where Vite outputs
  
  # Functions are in the root relative to the new command context
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"

[dev]
  framework = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  
  # Keep external modules if needed, but esbuild usually handles root deps fine now
  external_node_modules = ["pg", "argon2", "jsonwebtoken", "otplib", "@upstash/redis"]
  
  # Update paths to be relative to root
  included_files = ["netlify/functions/lib/**", "netlify/functions/node_modules/@upstash/**"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosynff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
