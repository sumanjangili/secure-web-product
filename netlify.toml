[build]
  # Run from root, which calls the frontend build
  command = "npm run build"
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"
  # Force TypeScript to ignore the baseUrl deprecation warning
  # This acts as a fallback if tsconfig.json isn't picked up perfectly
  NPM_CONFIG_STRICT_SSL = "false"

[dev]
  framework = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pg", "argon2", "jsonwebtoken", "otplib", "@upstash/redis"]
  included_files = ["netlify/functions/lib/**", "netlify/functions/node_modules/@upstash/**"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
