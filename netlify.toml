# netlify.toml
[build]
  # Frontend Build Configuration
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  
  # Functions Configuration (Relative to 'base' folder)
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"

[dev]
  # Frontend Dev Server
  framework = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false

# Ensure function dependencies are installed
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  # Global Functions Configuration
  directory = "../netlify/functions"
  node_bundler = "esbuild"
  
  # Combined list of external modules. 
  # Note: @upstash/redis is pure JS. If you moved it to root package.json, 
  # you can keep it here to ensure esbuild handles it correctly, 
  # or remove it if you want esbuild to bundle it entirely.
  # Based on your previous error, we keep it here to prevent bundling issues.
  external_node_modules = ["pg", "argon2", "jsonwebtoken", "otplib", "@upstash/redis"]
  
  # Ensure the Upstash SDK and local lib helpers are included in the bundle
  included_files = ["../netlify/functions/lib/**", "../netlify/functions/node_modules/@upstash/**"]

[[redirects]]
  # SPA Fallback (Must be last)
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Uncomment for local dev if you get CORS errors from browser
    # Access-Control-Allow-Origin = "*"
