# netlify.toml
[build]
  # Frontend Build Configuration
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  
  # Functions Configuration (Relative to 'base' folder)
  functions = "../netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"

[dev]
  # Frontend Dev Server
  framework = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false
  
  # NOTE: Do NOT set 'functions' here if running 'netlify functions:serve' manually.
  # Manual separation prevents port conflicts and allows independent debugging.

[functions]
  # Global Functions Configuration
  directory = "../netlify/functions"
  node_bundler = "esbuild"
  
  # CRITICAL: Only exclude NATIVE modules. 
  # @upstash/redis is pure JS and should be bundled.
  # ioredis is removed because we are switching to @upstash/redis.
  external_node_modules = ["pg", "argon2", "jsonwebtoken", "otplib"]
  
  # Ensure the Upstash SDK and local lib helpers are included in the bundle
  included_files = ["../netlify/functions/lib/**", "../netlify/functions/node_modules/@upstash/**"]

[[redirects]]
  # SPA Fallback (Must be last)
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Uncomment for local dev if you get CORS errors from browser
    # Access-Control-Allow-Origin = "*"
