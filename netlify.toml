[build]
  command = """
    cd frontend &&
    npm ci &&
    npx tsc --ignoreDeprecations 5.0 &&
    npm run build
  """
  publish = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY_USE_YARN = "false"
  NPM_CONFIG_PRODUCTION = "false"

  # Ignore specific environment variable names that are not secrets
  SECRETS_SCAN_OMIT_KEYS = "NODE_ENV,NODE_VERSION,CI,GITHUB_ACTIONS,NETLIFY"
  
  # Ignore paths containing .env files (ensure they are gitignored anyway)
  SECRETS_SCAN_OMIT_PATHS = ".env*,**/.env*,frontend/.env*"

[dev]
  framework = "vite"
  port = 9999
  targetPort = 5173
  autoLaunch = false

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["pg", "argon2", "jsonwebtoken", "otplib", "@upstash/redis"]
  included_files = ["netlify/functions/lib/**", "netlify/functions/node_modules/@upstash/**"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
